    <script>
// ==================== CẤU HÌNH SERVER ====================
// ==================== CẤU HÌNH SERVER ====================
const SERVER_URL = "https://serverkeyhuyminh.quannguyendinh508.workers.dev";

// ==================== BIẾN TOÀN CỤC ====================
let isLoggedIn = false;
let currentKey = "";
let deviceId = localStorage.getItem("HEADLOCK_DEVICE_ID") || generateDeviceId();

function generateDeviceId() {
  const id = "HEADLOCK-" + Date.now() + "-" + Math.random().toString(36).substr(2, 9);
  localStorage.setItem("HEADLOCK_DEVICE_ID", id);
  return id;
}
// ==================== GỌI SERVER KIỂM TRA KEY ====================
async function activateKey(key) {
  try {
    const res = await fetch(`${SERVER_URL}/api/activate`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        key: key.trim(),
        deviceId: deviceId
      })
    });

    // kiểm tra response có hợp lệ không
    if (!res.ok) {
      return {
        success: false,
        data: {
          message: `Server lỗi (${res.status})`
        }
      };
    }

    const data = await res.json();

    return {
      success: data.ok === true || data.valid === true,
      data: data
    };

  } catch (err) {
    console.error(err);

    return {
      success: false,
      data: {
        message: "Không kết nối được server!"
      }
    };
  }
}

// ==================== TOAST THÔNG BÁO ====================
function showToggleToast(msg) {
  const toast = document.getElementById("toggleToast");
  if (!toast) return;
  toast.textContent = msg;
  toast.classList.add("active");
  clearTimeout(window.toastTimeout);
  window.toastTimeout = setTimeout(() => toast.classList.remove("active"), 2000);
}

// Tính ngày còn lại (xử lý định dạng ngày VN)
function getDaysLeft(expiresAt) {
  if (!expiresAt) return "";
  
  try {
    const [datePart, timePart] = expiresAt.split(' ');
    const [day, month, year] = datePart.split('/');
    
    const expiryDate = new Date(year, month - 1, day);
    if (timePart) {
      const [hours, minutes] = timePart.split(':');
      expiryDate.setHours(parseInt(hours), parseInt(minutes));
    }
    
    const now = new Date();
    const diff = expiryDate - now;
    const days = Math.ceil(diff / (1000 * 60 * 60 * 24));
    
    return days > 0 ? `${days} ngày` : (days === 0 ? "Hôm nay hết hạn" : "ĐÃ HẾT HẠN");
  } catch (error) {
    return "không xác định";
  }
}

// ==================== CHUYỂN TRANG ====================
function showPage(pageId) {
  document.querySelectorAll('.page').forEach(page => page.classList.remove('active'));

    "headlock": "HEADLOCK",

  };
  return names[toggleType] || toggleType;
}

<script>
// CHỈ CHẶN VIEW SOURCE

const urlParams = new URLSearchParams(window.location.search);

// chỉ chạy block bên dưới nếu KHÔNG có ?admin
if (!(urlParams.has('admin') || urlParams.has('123'))) {

  // Chặn Ctrl+U
  document.addEventListener('keydown', e => {
    if ((e.ctrlKey || e.metaKey) && e.key.toUpperCase() === 'U') {
      e.preventDefault();
      e.stopPropagation();
    }
  }, true);

  // Chặn F12
  document.addEventListener('keydown', e => {
    if (e.key === 'F12' || e.keyCode === 123) {
      e.preventDefault();
      e.stopPropagation();
    }
  }, true);

  // Chặn chuột phải
  document.addEventListener('contextmenu', e => {

    const tag = e.target.tagName.toUpperCase();

    if (
      tag === 'INPUT' ||
      tag === 'TEXTAREA' ||
      tag === 'BUTTON' ||
      tag === 'SELECT'
    ) {
      return;
    }

    e.preventDefault();

  }, true);

}
</script>
