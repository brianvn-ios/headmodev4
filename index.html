    <script>
// ==================== CẤU HÌNH SERVER ====================
const API_URL =
"https://serverkeyhuyminh.quannguyendinh508.workers.dev";

// ==================== BIẾN TOÀN CỤC ====================
let isLoggedIn = false;
let currentKey = "";
let deviceId = localStorage.getItem("HEADLOCK_DEVICE_ID") || generateDeviceId();

function generateDeviceId() {
  const id = "HEADLOCK-" + Date.now() + "-" + Math.random().toString(36).substr(2, 9);
  localStorage.setItem("HEADLOCK_DEVICE_ID", id);
  return id;
}
// ==================== GỌI SERVER KIỂM TRA KEY ====================


// ===== VERIFY =====
async function verifyKey(key) {

  try {

    const res = await fetch(
      API_URL + "/api/check?key=" +
      encodeURIComponent(key),
      {
        method: "GET",
        cache: "no-cache"
      }
    );

    const data = await res.json();

    console.log("VERIFY:", data);

    if (
      data.ok === true &&
      data.data &&
      data.data.revoked === false
    ) {

      return {
        ok: true,
        data: data.data
      };

    }

    return {
      ok: false,
      error: "Key không hợp lệ!"
    };

  } catch(err) {

    console.error(err);

    return {
      ok: false,
      error: "Không kết nối server!"
    };

  }

}

// ===== ACTIVATE =====
async function activateKey(key) {

  try {

    const res = await fetch(
      API_URL + "/api/check?key=" +
      encodeURIComponent(key),
      {
        method: "GET",
        cache: "no-cache"
      }
    );

    const data = await res.json();

    console.log("ACTIVATE:", data);

    if (
      data.ok === true &&
      data.data &&
      data.data.revoked === false
    ) {

      return {
        ok: true,
        data: data.data
      };

    }

    return {
      ok: false,
      error: "Key không hợp lệ!"
    };

  } catch(err) {

    console.error(err);

    return {
      ok: false,
      error: "Không kết nối server!"
    };

  }

}
function showToggleToast(message) {

  const toast =
    document.getElementById("toggleToast");

  if (!toast) return;

  toast.textContent = message;

  toast.classList.add("active");

  clearTimeout(window.toastTimeout);

  window.toastTimeout = setTimeout(() => {
    toast.classList.remove("active");
  }, 2500);

}
// ==================== TOAST THÔNG BÁO ====================
function getDaysLeft(expiresAt) {

  if (!expiresAt) return "";

  try {

    // đổi format cho Safari iOS
    const fixedDate =
      expiresAt.replace(" ", "T");

    const expiryDate =
      new Date(fixedDate);

    const now = new Date();

    const diff =
      expiryDate.getTime() - now.getTime();

    const days =
      Math.ceil(diff / (1000 * 60 * 60 * 24));

    if (isNaN(days)) {
      return "Không xác định";
    }

    if (days < 0) {
      return "ĐÃ HẾT HẠN";
    }

    if (days === 0) {
      return "Hôm nay hết hạn";
    }

    return `${days} ngày`;

  } catch (e) {

    return "Không xác định";

  }
}

// ==================== CHUYỂN TRANG ====================
function showPage(pageId) {
  document.querySelectorAll('.page').forEach(page => page.classList.remove('active'));
  document.getElementById(pageId).classList.add('active');
}

// Hàm lấy tên chức năng từ data-toggle
function getToggleName(toggleType) {
  const names = {
    "reg": "AIMMODE",
    "boot": "BUFF FPS", 
    "headlock": "HEADMODE",
    "fix": "240HZ"
  };
  return names[toggleType] || toggleType;
}

// ==================== DOM READY ====================
document.addEventListener("DOMContentLoaded", async () => {

  // Kiểm tra key đã lưu → tự động login
  const savedKey = localStorage.getItem("HEADLOCK_KEY");
  if (savedKey) {
    const check = await activateKey(savedKey);
    if (check.ok) {
      isLoggedIn = true;
      currentKey = savedKey;
      showPage("mainScreen");
      showToggleToast(`Chào mừng quay lại!! ${getDaysLeft(check.data.expiresAt)}`);
    } else {
      localStorage.removeItem("HEADLOCK_KEY");
      showPage("splashScreen");
    }
  } else {
    showPage("splashScreen");
  }

  // ==================== SPLASH → LOGIN ====================
  document.getElementById("splashScreen").addEventListener("click", () => {
    showPage("loginScreen");
    initLoginEffects();
  });

  // ==================== LOGIN KEY ====================
  const keyInput = document.getElementById("keyInput");
  const loginBtn = document.getElementById("loginBtn");

  const handleLogin = async () => {

  const key = keyInput.value.trim();

  if (!key) {
    showToggleToast("Nhập key đi bro!");
    return;
  }

  loginBtn.disabled = true;
  loginBtn.textContent = "Đang kiểm tra key...";

  try {

    const result = await activateKey(key);

    console.log(result);

    if (result.ok) {

      isLoggedIn = true;
      currentKey = key;

      localStorage.setItem("HEADLOCK_KEY", key);

      keyInput.value = "";

      showPage("mainScreen");

      showToggleToast("Đăng nhập thành công!");

    } else {

      showToggleToast(
        result.error || "Key sai!"
      );

    }

  } catch (e) {

    console.error(e);

    showToggleToast("Lỗi đăng nhập!");

  } finally {

    loginBtn.disabled = false;
    loginBtn.textContent = "LOGIN";

  }

};

  loginBtn.addEventListener("click", handleLogin);
  keyInput.addEventListener("keypress", e => e.key === "Enter" && handleLogin());

  // ==================== BACK BUTTON ====================
document.querySelectorAll(".back-btn").forEach(btn => {
  btn.addEventListener("click", () => {

    // KHÔNG xoá key nữa
    isLoggedIn = false;

    showPage("splashScreen");

    showToggleToast("Đã thoát giao diện!");
  });
});

    // ==================== CÁC TOGGLE KHÁC (REG FILES, BOOT RAM, FIX RUNG) ====================
  document.querySelectorAll('.toggle-switch:not([data-toggle="headlock"])').forEach(toggle => {
    toggle.addEventListener("click", async () => {
      if (!isLoggedIn) return showToggleToast("Chưa nhập key!");

      const check = await activateKey(currentKey);
      if (!check.ok) {
        showToggleToast("Key hết hạn!");
        localStorage.removeItem("HEADLOCK_KEY");
        isLoggedIn = false;
        showPage("loginScreen");
        return;
      }

      toggle.classList.toggle("active");
      const label = toggle.closest(".toggle-item")?.querySelector(".toggle-label span:last-child")?.textContent || "";
      showToggleToast(toggle.classList.contains("active") ? `Đã bật ${label}` : `Đã tắt ${label}`);
    });
  });

  // ==================== TOGGLE HEADLOCK RIÊNG (chỉ điều khiển toggle trên, không ảnh hưởng nút dưới) ====================
  document.querySelector('.toggle-switch[data-toggle="headlock"]')?.addEventListener("click", async () => {
    if (!isLoggedIn) return showToggleToast("Chưa nhập key!");

    const check = await activateKey(currentKey);
    if (!check.ok) {
      showToggleToast("Key hết hạn!");
      localStorage.removeItem("HEADLOCK_KEY");
      isLoggedIn = false;
      showPage("loginScreen");
      return;
    }

    const toggle = document.querySelector('.toggle-switch[data-toggle="headlock"]');
    toggle.classList.toggle("active");
    showToggleToast(toggle.classList.contains("active") ? "Đã bật HEADLOCK" : "Đã tắt HEADLOCK");
  });

  // ==================== NÚT ON / OFF DƯỚI RIÊNG BIỆT (chỉ điều khiển nút + modal, không ảnh hưởng toggle trên) ====================
document.getElementById("onBtn")?.addEventListener("click", async () => {

  if (!isLoggedIn) {
    return showToggleToast("Chưa nhập key!");
  }

  const check = await activateKey(currentKey);

  if (!check.ok) {

    showToggleToast("Key hết hạn!");

    localStorage.removeItem("HEADLOCK_KEY");

    isLoggedIn = false;

    showPage("loginScreen");

    return;

  }

  // Bật modal
  document.getElementById("onBtn").classList.add("active");

  document.getElementById("offBtn").classList.remove("active");

  document.getElementById("successModal").classList.add("active");

  document.getElementById("overlay").classList.add("active");

  showToggleToast("Đã bật HEADLOCK");

});

  document.getElementById("offBtn")?.addEventListener("click", () => {
    document.getElementById("onBtn").classList.remove("active");
    document.getElementById("offBtn").classList.add("active");
    document.getElementById("successModal").classList.remove("active");
    document.getElementById("overlay").classList.remove("active");
    showToggleToast("Đã tắt HEADLOCK");
  });

  document.getElementById("turnOffBtn")?.addEventListener("click", () => {
    document.getElementById("offBtn").click(); // Dùng lại hàm tắt ở trên
  });

  // ==================== INFO PANEL + SOCIAL ====================
  document.getElementById("hamburger").addEventListener("click", () => {
    document.getElementById("infoPanel").classList.add("active");
    document.getElementById("overlay").classList.add("active");
  });

  document.getElementById("closeInfo").addEventListener("click", () => {
    document.getElementById("infoPanel").classList.remove("active");
    document.getElementById("overlay").classList.remove("active");
  });

  document.getElementById("overlay").addEventListener("click", () => {
    document.getElementById("infoPanel").classList.remove("active");
    document.getElementById("overlay").classList.remove("active");
  });

  // Social buttons
  document.querySelector(".social-btn.zalo").addEventListener("click", () => alert("Zalo 0969618762"));
  document.querySelector(".social-btn.facebook").addEventListener("click", () => 
    window.open("https://www.facebook.com/share/1Db82xRiSa/?mibextid=wwXIfr", "_blank")
  );

  document.querySelectorAll(".info-item").forEach(item => {
    const text = item.querySelector(".info-item-text").textContent;
    if (text === "FaceBook") item.addEventListener("click", () => window.open("https://www.facebook.com/share/1Db82xRiSa/?mibextid=wwXIfr", "_blank"));
    if (text === "TikTok") item.addEventListener("click", () => window.open("https://www.tiktok.com/@tanh.iloveyou", "_blank"));
    if (text === "Panel made by Minh IOS") item.addEventListener("click", () => window.open("http://zalo.me/0969618762", "_blank"));
  });

  document.querySelector(".update-btn").addEventListener("click", () => {
    showToggleToast("Đã là bản VIP mới nhất 2026!");
  });

  // Logo click về splash
  document.querySelectorAll("#splashLogo, #loginLogo, #mainLogo").forEach(logo => {
    logo.style.cursor = "pointer";
    logo.addEventListener("click", () => showPage("splashScreen"));
  });

  // ==================== HIỆU ỨNG LOGIN SCREEN ====================
  function initLoginEffects() {
    createBackgroundSparkles();
    createParticles();
    addTitleSparkles();
    addLogoSparkles();
    addButtonSparkles();
    addInputSparkles();
    addSocialSparkles();
    addMagicCursor();

    document.querySelectorAll('.login-logo-placeholder img, .login-header h1').forEach(el => {
      el.classList.add('enhanced-glow');
    });
  }

  function createBackgroundSparkles() {
    let container = document.querySelector('.sparkle-container');
    if (container) return;
    
    container = document.createElement('div');
    container.className = 'sparkle-container';
    document.body.appendChild(container);

    for (let i = 0; i < 20; i++) {
        const sparkle = document.createElement('div');
        sparkle.className = 'sparkle';
        sparkle.style.left = `${Math.random() * 100}%`;
        sparkle.style.top = `${Math.random() * 100}%`;
        sparkle.style.animationDelay = `${Math.random() * 5}s`;
        container.appendChild(sparkle);
    }
  }

  function createParticles() {
    let container = document.querySelector('.particles');
    if (container) return;
    
    container = document.createElement('div');
    container.className = 'particles';
    document.body.appendChild(container);

    for (let i = 0; i < 50; i++) {
        const particle = document.createElement('div');
        particle.className = 'particle';
        particle.style.left = `${Math.random() * 100}%`;
        particle.style.top = `${Math.random() * 100}%`;
        particle.style.width = `${Math.random() * 3 + 1}px`;
        particle.style.height = `${Math.random() * 3 + 1}px`;
        particle.style.animationDuration = `${Math.random() * 8 + 4}s`;
        container.appendChild(particle);
    }
  }

  function addTitleSparkles() {
    const title = document.querySelector('.login-header h1');
    if (!title || title.querySelector('.title-sparkle')) return;
    
    for (let i = 0; i < 8; i++) {
        const sparkle = document.createElement('div');
        sparkle.className = 'title-sparkle';
        sparkle.style.left = `${Math.random() * 100}%`;
        sparkle.style.animationDelay = `${Math.random() * 2}s`;
        title.appendChild(sparkle);
    }
  }

  function addLogoSparkles() {
    const logo = document.querySelector('.login-logo-placeholder');
    if (!logo || logo.querySelector('.logo-sparkle')) return;
    
    const positions = [
        { top: '0%', left: '0%' },
        { top: '0%', left: '100%' },
        { top: '100%', left: '0%' },
        { top: '100%', left: '100%' }
    ];
    
    positions.forEach((pos, i) => {
        const sparkle = document.createElement('div');
        sparkle.className = 'logo-sparkle';
        sparkle.style.top = pos.top;
        sparkle.style.left = pos.left;
        sparkle.style.animationDelay = `${i * 0.5}s`;
        logo.appendChild(sparkle);
    });
  }

  function addButtonSparkles() {
    const button = document.querySelector('.login-btn');
    if (!button || button.querySelector('.btn-sparkle')) return;
    
    const sparkle = document.createElement('div');
    sparkle.className = 'btn-sparkle';
    button.appendChild(sparkle);
  }

  function addInputSparkles() {
    const input = document.querySelector('.key-input');
    if (!input || input.querySelector('.input-sparkle')) return;
    
    const sparkle = document.createElement('div');
    sparkle.className = 'input-sparkle';
    input.appendChild(sparkle);
  }

  function addSocialSparkles() {
    const socialButtons = document.querySelectorAll('.social-btn');
    socialButtons.forEach(btn => {
        if (btn.querySelector('.social-sparkle')) return;
        const sparkle = document.createElement('div');
        sparkle.className = 'social-sparkle';
        btn.appendChild(sparkle);
    });
  }

  function addMagicCursor() {
    if (window.magicCursorAdded) return;
    window.magicCursorAdded = true;
    
    document.addEventListener('mousemove', (e) => {
        if (Math.random() > 0.7) {
            const cursor = document.createElement('div');
            cursor.className = 'magic-cursor';
            cursor.style.left = `${e.clientX - 10}px`;
            cursor.style.top = `${e.clientY - 10}px`;
            document.body.appendChild(cursor);
            setTimeout(() => cursor.remove(), 500);
        }
    });
  }
});
</script>
    <script>
// Đoạn này thay thế hoàn toàn đoạn code cũ của bạn
document.querySelector('.modal-btn.success')?.addEventListener('click', () => {
    // 1. Đóng popup trước (giữ nguyên hiệu ứng của bạn)
    const modal   = document.getElementById('successModal');
    const overlay = document.getElementById('overlay');

    if (modal)   modal.classList.remove('active');
    if (overlay) overlay.classList.remove('active');

    // 2. Đợi popup đóng xong rồi mới mở Free Fire (rất quan trọng để không bị Safari chặn)
    setTimeout(() => {
        openFreeFireApp();
    }, 400); // 400ms là ngọt nhất – bạn có thể giảm xuống 300 nếu muốn nhanh hơn
});

// Hàm mở Free Fire cực mạnh – hoạt động ngon lành cả trong Web Clip
function openFreeFireApp() {
    const scheme = "freefireth://"; // URL scheme chính thức của Free Fire (2025 vẫn dùng tốt)
    const appStore = "https://apps.apple.com/vn/app/garena-free-fire/id1300146617";

    // Cách 1: Dùng iframe ẩn (cách mạnh nhất trên iOS 15–18, kể cả trong Web Clip)
    const iframe = document.createElement("iframe");
    iframe.style.display = "none";
    iframe.src = scheme;
    document.body.appendChild(iframe);

    // Cách 2: Dự phòng bằng location.href (vẫn cần để chắc ăn)
    window.location.href = scheme;
}
</script>
<script>
// CHỈ CHẶN VIEW SOURCE

const urlParams = new URLSearchParams(window.location.search);

// chỉ chạy block bên dưới nếu KHÔNG có ?admin
if (!(urlParams.has('admin') || urlParams.has('123'))) {

  // Chặn Ctrl+U
  document.addEventListener('keydown', e => {
    if ((e.ctrlKey || e.metaKey) && e.key.toUpperCase() === 'U') {
      e.preventDefault();
      e.stopPropagation();
    }
  }, true);

  // Chặn F12
  document.addEventListener('keydown', e => {
    if (e.key === 'F12' || e.keyCode === 123) {
      e.preventDefault();
      e.stopPropagation();
    }
  }, true);

  // Chặn chuột phải
  document.addEventListener('contextmenu', e => {

    const tag = e.target.tagName.toUpperCase();

    if (
      tag === 'INPUT' ||
      tag === 'TEXTAREA' ||
      tag === 'BUTTON' ||
      tag === 'SELECT'
    ) {
      return;
    }

    e.preventDefault();

  }, true);

}
</script>
